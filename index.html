<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Segéd Pro - 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-card { background-color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 650px; text-align: center; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-blue { flex: 1; min-width: 120px; padding: 15px; background-color: #2980b9; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-gold { flex: 1; min-width: 120px; padding: 15px; background-color: #d4af37; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-green { flex: 1; min-width: 120px; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .data-display { background-color: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; text-align: left; min-height: 100px; font-size: 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; color: #333; }
        .header-gold { color: #d4af37; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .calc-input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; text-align: left; }
        .calc-input-group label { font-weight: bold; font-size: 14px; color: #555; }
        .mehet-btn { width: 100%; padding: 15px; background-color: #8e44ad; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="btn-group">
            <button class="btn-blue" onclick="getValuta()">ÁRFOLYAM</button>
            <button class="btn-gold" onclick="getArany()">ARANY</button>
            <button class="btn-green" onclick="mutatBerPanel()">MUNKABÉR</button>
        </div>

        <div id="kijelzo" class="data-display">Válassz egy funkciót!</div>

        <input type="text" id="szo" placeholder="Google keresés...">
        <button class="btn-blue" style="width:100%;" onclick="indit()">KERESÉS</button>
    </div>

    <script>
        // Formázó függvény: 123456 -> 123 456
        function formatNumber(n) {
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Tisztító függvény: "123 456 Ft" -> 123456
        function cleanNumber(s) {
            return parseInt(s.replace(/\D/g, '')) || 0;
        }

        async function getValuta() {
            const k = document.getElementById('kijelzo');
            k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const data = await res.json();
                const eur = (data.rates.HUF).toFixed(2);
                const usd = (data.rates.HUF / data.rates.USD).toFixed(2);
                k.innerHTML = `<b>1 EUR:</b> ${eur} Ft<br><b>1 USD:</b> ${usd} Ft`;
            } catch (e) { k.innerText = "Hiba az árfolyamnál."; }
        }

        async function getArany() {
            const k = document.getElementById('kijelzo');
            k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/XAU-HUF/spot');
                const data = await res.json();
                const gramm = parseFloat(data.data.amount) / 31.1035;
                k.innerHTML = `<table><tr><th>Karát</th><th>Ft/g</th></tr>
                    <tr><td>14K</td><td>${Math.round(gramm*0.585).toLocaleString()} Ft</td></tr>
                    <tr><td>24K</td><td>${Math.round(gramm).toLocaleString()} Ft</td></tr></table>`;
            } catch (e) { k.innerText = "Hiba az aranyárnál."; }
        }

        function mutatBerPanel() {
            const k = document.getElementById('kijelzo');
            k.innerHTML = `
                <div class="calc-input-group">
                    <label>Bruttó bér (Ft):</label>
                    <input type="text" id="bruttoInp" oninput="berSzamol('brutto')" placeholder="0">
                    <label>Nettó bér (Ft):</label>
                    <input type="text" id="nettoInp" oninput="berSzamol('netto')" placeholder="0">
                </div>
                <button class="mehet-btn" onclick="generalTablazat()">MEHET</button>
                <div id="tablazatHelye"></div>
            `;
        }

        function berSzamol(irany) {
            const bInp = document.getElementById('bruttoInp');
            const nInp = document.getElementById('nettoInp');
            
            if (irany === 'brutto') {
                let br = cleanNumber(bInp.value);
                bInp.value = formatNumber(br);
                let nt = Math.round(br * 0.665);
                nInp.value = formatNumber(nt);
            } else {
                let nt = cleanNumber(nInp.value);
                nInp.value = formatNumber(nt);
                let br = Math.round(nt / 0.665);
                bInp.value = formatNumber(br);
            }
        }

        function generalTablazat() {
            const br = cleanNumber(document.getElementById('bruttoInp').value);
            const nt = cleanNumber(document.getElementById('nettoInp').value);
            if(br === 0) return;

            const szja = Math.round(br * 0.15);
            const tb = Math.round(br * 0.185);
            const szocho = Math.round(br * 0.13);
            const osszkoltseg = br + szocho;

            document.getElementById('tablazatHelye').innerHTML = `
                <table>
                    <tr>
                        <th colspan="2">Levonások</th>
                        <th>Munkáltató</th>
                    </tr>
                    <tr>
                        <td colspan="2" class="header-gold">Bruttó: ${formatNumber(br)} Ft | Nettó: ${formatNumber(nt)} Ft</td>
                        <td>Össz. kiadás</td>
                    </tr>
                    <tr>
                        <td>SZJA (15%)</td>
                        <td>${formatNumber(szja)} Ft</td>
                        <td rowspan="3" style="vertical-align: middle; font-size: 18px; color: #27ae60;">
                            ${formatNumber(osszkoltseg)} Ft
                        </td>
                    </tr>
                    <tr>
                        <td>TB járulék (18,5%)</td>
                        <td>${formatNumber(tb)} Ft</td>
                    </tr>
                    <tr>
                        <td>Szocho (13%)</td>
                        <td>-</td>
                    </tr>
                </table>
            `;
        }

        function indit() {
            const s = document.getElementById('szo').value;
            if (s) window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(s);
        }
    </script>
</body>
</html>
