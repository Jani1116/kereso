<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Segéd Pro - Teljes Verzió</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-card { background-color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 700px; text-align: center; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-blue, .btn-gold, .btn-green { flex: 1; padding: 15px; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #2980b9; } .btn-gold { background-color: #d4af37; } .btn-green { background-color: #27ae60; }
        .data-display { background-color: #f8f9fa; border-radius: 10px; padding: 15px; border: 1px solid #ddd; text-align: left; overflow-x: auto; min-height: 80px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #eee; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .calc-row { display: flex; gap: 10px; text-align: left; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
        .calc-row div { flex: 1; min-width: 120px; }
        .rates-info { font-size: 12px; color: #555; margin: 10px 0; text-align: left; background: #eef2f3; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-small { padding: 6px 12px; font-size: 11px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .mehet-btn { width: 100%; padding: 15px; background-color: #8e44ad; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .highlight-green { font-weight: bold; color: #27ae60; font-size: 18px; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="btn-group">
            <button class="btn-blue" onclick="getValuta()">ÁRFOLYAM</button>
            <button class="btn-gold" onclick="getArany()">ARANY</button>
            <button class="btn-green" onclick="mutatBerPanel()">MUNKABÉR</button>
        </div>
        <div id="kijelzo" class="data-display">Válassz egy funkciót!</div>
    </div>

    <script>
        // Időtálló adókulcsok
        let kulcsok = { szja: 15, tb: 18.5, szocho: 13, min30: 96840 };

        function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function cleanNumber(s) { return parseInt(s.toString().replace(/\D/g, '')) || 0; }

        async function getValuta() {
            const k = document.getElementById('kijelzo'); k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const d = await res.json();
                const r = d.rates;
                k.innerHTML = `
                    <div style="color: #2980b9; font-weight: bold; margin-bottom: 5px;">Élő középárfolyamok:</div>
                    1 EUR = <b>${r.HUF.toFixed(2)} Ft</b><br>
                    1 USD = <b>${(r.HUF / r.USD).toFixed(2)} Ft</b><br>
                    1 GBP = <b>${(r.HUF / r.GBP).toFixed(2)} Ft</b>`;
            } catch(e) { k.innerText = "Hiba az adatok lekérésekor."; }
        }

        async function getArany() {
            const k = document.getElementById('kijelzo'); k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/XAU-HUF/spot');
                const d = await res.json();
                const gramm = parseFloat(d.data.amount) / 31.1035;
                k.innerHTML = `
                    <table style="margin-top:0">
                        <tr><th>Karát</th><th>Ár (Ft/g)</th></tr>
                        <tr><td>14K (585)</td><td><b>${Math.round(gramm*0.585).toLocaleString()} Ft</b></td></tr>
                        <tr><td>18K (750)</td><td><b>${Math.round(gramm*0.750).toLocaleString()} Ft</b></td></tr>
                        <tr><td>24K (Szín)</td><td><b>${Math.round(gramm).toLocaleString()} Ft</b></td></tr>
                    </table>`;
            } catch(e) { k.innerText = "Hiba az aranyár lekérésekor."; }
        }

        function mutatBerPanel() {
            const k = document.getElementById('kijelzo');
            k.innerHTML = `
                <div class="calc-row">
                    <div><label>Bruttó (Ft)</label><input type="text" id="bruttoInp" oninput="berSzamol('brutto')" value="0"></div>
                    <div><label>Nettó (Ft)</label><input type="text" id="nettoInp" oninput="berSzamol('netto')" value="0"></div>
                    <div><label>Gyerekek</label><input type="number" id="gyerekInp" value="0" min="0" oninput="berSzamol('brutto')"></div>
                </div>
                <div class="rates-info" id="rateBox">
                    <span>SZJA: ${kulcsok.szja}%, TB: ${kulcsok.tb}%, Szocho: ${kulcsok.szocho}%</span>
                    <button class="btn-small" onclick="valtoztatMod()">VÁLTOZTATÁS</button>
                </div>
                <button class="mehet-btn" onclick="generalTablazat()">MEHET</button>
                <div id="tablazatHelye"></div>
            `;
        }

        function valtoztatMod() {
            const rb = document.getElementById('rateBox');
            rb.innerHTML = `
                SZJA%: <input type="number" id="editSzja" value="${kulcsok.szja}" style="width:45px"> 
                TB%: <input type="number" id="editTb" value="${kulcsok.tb}" style="width:45px"> 
                Szocho%: <input type="number" id="editSzocho" value="${kulcsok.szocho}" style="width:45px">
                <button class="btn-small" onclick="mentKulcsok()">MENTÉS</button>
            `;
        }

        function mentKulcsok() {
            kulcsok.szja = parseFloat(document.getElementById('editSzja').value) || 0;
            kulcsok.tb = parseFloat(document.getElementById('editTb').value) || 0;
            kulcsok.szocho = parseFloat(document.getElementById('editSzocho').value) || 0;
            mutatBerPanel();
        }

        function getCsaladiKedv(brutto, gy) {
            let k = (gy === 1) ? 20000 : (gy === 2) ? 80000 : (gy > 2) ? gy * 66000 : 0;
            return Math.min(k, brutto * ((kulcsok.szja + kulcsok.tb) / 100));
        }

        function berSzamol(irany) {
            const b = document.getElementById('bruttoInp'), n = document.getElementById('nettoInp'), g = document.getElementById('gyerekInp');
            let br = cleanNumber(b.value), gy = parseInt(g.value) || 0;
            let nettoSzorzo = (100 - (kulcsok.szja + kulcsok.tb)) / 100;
            if (irany === 'brutto') {
                n.value = formatNumber(Math.round(br * nettoSzorzo + getCsaladiKedv(br, gy)));
                b.value = formatNumber(br);
            } else {
                let nt = cleanNumber(n.value);
                br = Math.round((nt - getCsaladiKedv(nt/nettoSzorzo, gy)) / nettoSzorzo);
                b.value = formatNumber(br);
                n.value = formatNumber(nt);
            }
        }

        function generalTablazat() {
            const br = cleanNumber(document.getElementById('bruttoInp').value);
            const gy = parseInt(document.getElementById('gyerekInp').value) || 0;
            const kedv = getCsaladiKedv(br, gy);
            const nt = cleanNumber(document.getElementById('nettoInp').value);
            
            const szjaVal = Math.max(0, Math.round(br * (kulcsok.szja/100)) - kedv);
            const tbVal = Math.round(br * (kulcsok.tb/100));
            const szochoVal = Math.round(br * (kulcsok.szocho/100));
            const tbKieg = br < kulcsok.min30 && br > 0 ? Math.round((kulcsok.min30 - br) * (kulcsok.tb/100)) : 0;
            
            const osszKiad = br + szochoVal + tbKieg;

            document.getElementById('tablazatHelye').innerHTML = `
                <table>
                    <tr><th colspan="2">Levonások</th><th colspan="2">Munkáltató</th></tr>
                    <tr><td colspan="4"><b>Bruttó: ${formatNumber(br)} Ft | Nettó: ${formatNumber(nt)} Ft</b></td></tr>
                    <tr><td>SZJA (${kulcsok.szja}%)</td><td>${formatNumber(szjaVal)} Ft</td><td>Szocho (${kulcsok.szocho}%)</td><td>${formatNumber(szochoVal)} Ft</td></tr>
                    <tr><td>TB járulék (${kulcsok.tb}%)</td><td>${formatNumber(tbVal)} Ft</td><td>TB kiegészítés</td><td>${tbKieg > 0 ? formatNumber(tbKieg) + ' Ft' : '-'}</td></tr>
                    <tr><td><i>Családi kedv.</i></td><td><i>+${formatNumber(kedv)} Ft</i></td><td colspan="2" style="font-size:10px">Munkáltató fizeti (bruttó összeg)-on felül</td></tr>
                    <tr>
                        <td colspan="2"></td>
                        <td colspan="2">
                            Nettó nélküli kiadás:<br><span class="highlight-green">${formatNumber(osszKiad - nt)} Ft</span><br>
                            <small>(Összes kiadás: ${formatNumber(osszKiad)} Ft)</small>
                        </td>
                    </tr>
                </table>`;
        }
    </script>
</body>
</html>
