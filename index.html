<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Segéd</title>
    <style>
        /* A teljes háttér sötétebb lesz, hogy kiemelje a kis ablakot */
        body { 
            font-family: sans-serif; 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Ez a "kis ablak" (kártya) stílusa */
        .app-card { 
            background-color: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
        }

        h1 { color: #333; font-size: 22px; margin-bottom: 20px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box;
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>Magyar Segéd</h1>
        <input type="text" id="szo" placeholder="Mit keressek?">
        <button onclick="indit()">MEHET</button>
    </div>

    <script>
        function indit() {
            var bevitel = document.getElementById('szo').value;
            if (bevitel === "") return;

            var hang = new SpeechSynthesisUtterance("Keresem: " + bevitel);
            hang.lang = 'hu-HU';
            window.speechSynthesis.speak(hang);
            
            setTimeout(function(){
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(bevitel);
            }, 1200);
        }
    </script>
</body>
</html>
