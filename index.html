<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Segéd Pro - 2026</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-card { background-color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 700px; text-align: center; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-blue, .btn-gold, .btn-green { flex: 1; padding: 15px; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #2980b9; } .btn-gold { background-color: #d4af37; } .btn-green { background-color: #27ae60; }
        .data-display { background-color: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; text-align: left; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #eee; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .calc-row { display: flex; gap: 10px; text-align: left; flex-wrap: wrap; }
        .calc-row div { flex: 1; min-width: 140px; }
        .mehet-btn { width: 100%; padding: 15px; background-color: #8e44ad; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .footer-val { font-weight: bold; color: #27ae60; font-size: 16px; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="btn-group">
            <button class="btn-blue" onclick="getValuta()">ÁRFOLYAM</button>
            <button class="btn-gold" onclick="getArany()">ARANY</button>
            <button class="btn-green" onclick="mutatBerPanel()">MUNKABÉR</button>
        </div>
        <div id="kijelzo" class="data-display">Válassz egy funkciót!</div>
        <input type="text" id="szo" placeholder="Google keresés...">
        <button class="btn-blue" style="width:100%;" onclick="indit()">KERESÉS</button>
    </div>

    <script>
        function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function cleanNumber(s) { return parseInt(s.toString().replace(/\D/g, '')) || 0; }

        function mutatBerPanel() {
            document.getElementById('kijelzo').innerHTML = `
                <div class="calc-row">
                    <div><label>Bruttó (Ft)</label><input type="text" id="bruttoInp" oninput="berSzamol('brutto')" value="0"></div>
                    <div><label>Nettó (Ft)</label><input type="text" id="nettoInp" oninput="berSzamol('netto')" value="0"></div>
                    <div><label>Gyerekek</label><input type="number" id="gyerekInp" value="0" min="0" oninput="berSzamol('brutto')"></div>
                </div>
                <button class="mehet-btn" onclick="generalTablazat()">MEHET</button>
                <div id="tablazatHelye"></div>
            `;
        }

        function getCsaladiKedvezmeny(brutto, gyerek) {
            if (gyerek <= 0) return 0;
            let kedv = 0;
            if (gyerek === 1) kedv = 20000;
            else if (gyerek === 2) kedv = 80000;
            else kedv = gyerek * 66000;
            // A kedvezmény nem lehet több, mint az adók (SZJA + TB)
            return Math.min(kedv, brutto * 0.335);
        }

        function berSzamol(irany) {
            const bInp = document.getElementById('bruttoInp'), nInp = document.getElementById('nettoInp'), gInp = document.getElementById('gyerekInp');
            let br = cleanNumber(bInp.value), gy = parseInt(gInp.value) || 0;
            if (irany === 'brutto') {
                let nt = Math.round(br * 0.665) + getCsaladiKedvezmeny(br, gy);
                nInp.value = formatNumber(nt);
                bInp.value = formatNumber(br);
            } else {
                let nt = cleanNumber(nInp.value);
                // Közelítő bruttó számítás kedvezmény esetén
                br = Math.max(0, Math.round((nt - getCsaladiKedvezmeny(nt/0.665, gy)) / 0.665));
                bInp.value = formatNumber(br);
                nInp.value = formatNumber(nt);
            }
        }

        function generalTablazat() {
            const br = cleanNumber(document.getElementById('bruttoInp').value);
            const gy = parseInt(document.getElementById('gyerekInp').value) || 0;
            const kedv = getCsaladiKedvezmeny(br, gy);
            const nt = Math.round(br * 0.665) + kedv;

            const szja = Math.round(br * 0.15);
            const tb = Math.round(br * 0.185);
            const szocho = Math.round(br * 0.13);
            
            // TB kiegészítés (ha br < minimálbér 30%-a, ami 2026-ban 96 840 Ft)
            const kuszob = 96840;
            const tbKieg = br < kuszob ? Math.round((kuszob - br) * 0.185) : 0;
            const szochoKieg = br < kuszob ? Math.round((kuszob - br) * 0.13) : 0;
            
            const munkaltatoOsszes = br + szocho + tbKieg + szochoKieg;

            document.getElementById('tablazatHelye').innerHTML = `
                <table>
                    <tr><th colspan="2">Levonások</th><th colspan="2">Munkáltató</th></tr>
                    <tr><td colspan="4"><b>Bruttó: ${formatNumber(br)} Ft | Nettó: ${formatNumber(nt)} Ft</b></td></tr>
                    <tr><td>SZJA (15%)</td><td>${formatNumber(Math.max(0, szja - kedv))} Ft</td><td>Szocho (13%)</td><td>${formatNumber(szocho + szochoKieg)} Ft</td></tr>
                    <tr><td>TB járulék (18,5%)</td><td>${formatNumber(tb)} Ft</td><td>TB kieg.</td><td>${tbKieg > 0 ? formatNumber(tbKieg) + ' Ft' : '-'}</td></tr>
                    <tr><td><i>Kedvezmény</i></td><td><i>+${formatNumber(kedv)} Ft</i></td><td>-</td><td>-</td></tr>
                    <tr>
                        <td colspan="2"></td>
                        <td colspan="2">
                            Kiadás összesen:<br><span class="footer-val">${formatNumber(munkaltatoOsszes)} Ft</span><br>
                            <small>(${formatNumber(munkaltatoOsszes - nt)} Ft különbség)</small>
                        </td>
                    </tr>
                </table>`;
        }
        
        // Eredeti API hívások (rövidítve)
        async function getValuta() {
            const k = document.getElementById('kijelzo'); k.innerText = "Töltés...";
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const d = await res.json();
                k.innerHTML = `1 EUR = ${d.rates.HUF.toFixed(2)} Ft<br>1 USD = ${(d.rates.HUF/d.rates.USD).toFixed(2)} Ft`;
            } catch(e) { k.innerText = "Hiba."; }
        }
        async function getArany() {
            const k = document.getElementById('kijelzo'); k.innerText = "Töltés...";
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/XAU-HUF/spot');
                const d = await res.json();
                const g = parseFloat(d.data.amount)/31.1035;
                k.innerHTML = `24K Arany: ${Math.round(g).toLocaleString()} Ft/g`;
            } catch(e) { k.innerText = "Hiba."; }
        }
        function indit() { window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(document.getElementById('szo').value); }
    </script>
</body>
</html>
