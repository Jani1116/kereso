<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Segéd Pro - Élő Verzió</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-card { background-color: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 700px; text-align: center; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-blue, .btn-gold, .btn-green, .btn-red { flex: 1; min-width: 120px; padding: 15px; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background-color: #2980b9; } 
        .btn-gold { background-color: #d4af37; } 
        .btn-green { background-color: #27ae60; }
        .btn-red { background-color: #c0392b; }
        .data-display { background-color: #f8f9fa; border-radius: 10px; padding: 15px; border: 1px solid #ddd; text-align: left; overflow-x: auto; min-height: 80px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #eee; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .calc-row { display: flex; gap: 10px; text-align: left; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
        .calc-row div { flex: 1; min-width: 120px; }
        .rates-info { font-size: 12px; color: #555; margin: 10px 0; text-align: left; background: #eef2f3; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-small { padding: 6px 12px; font-size: 11px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .mehet-btn { width: 100%; padding: 15px; background-color: #8e44ad; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Törvény kártyák stílusa */
        .law-item { background: #fff; border-left: 5px solid #c0392b; border-bottom: 1px solid #ddd; margin-bottom: 10px; padding: 12px; text-align: left; }
        .law-title { font-weight: bold; color: #2c3e50; font-size: 14px; text-decoration: none; display: block; margin-bottom: 5px; }
        .law-date { font-size: 11px; color: #7f8c8d; }
        .date-range-header { font-size: 13px; color: #c0392b; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #c0392b; padding-bottom: 5px; }
        .loader { text-align: center; padding: 20px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="btn-group">
            <button class="btn-blue" onclick="getValuta()">ÁRFOLYAM</button>
            <button class="btn-gold" onclick="getArany()">ARANY</button>
            <button class="btn-green" onclick="mutatBerPanel()">MUNKABÉR</button>
            <button class="btn-red" onclick="getFrissTorvenyek()">TÖRVÉNY</button>
        </div>
        <div id="kijelzo" class="data-display">Válassz egy funkciót!</div>
    </div>

    <script>
        let kulcsok = { szja: 15, tb: 18.5, szocho: 13, min30: 96840 };

        function formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
        function cleanNumber(s) { return parseInt(s.toString().replace(/\D/g, '')) || 0; }

        async function getValuta() {
            const k = document.getElementById('kijelzo'); k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const d = await res.json();
                k.innerHTML = `<div style="color:#2980b9;font-weight:bold">Élő középárfolyamok:</div>1 EUR = <b>${d.rates.HUF.toFixed(2)} Ft</b><br>1 USD = <b>${(d.rates.HUF/d.rates.USD).toFixed(2)} Ft</b>`;
            } catch(e) { k.innerText = "Hiba az adatoknál."; }
        }

        async function getArany() {
            const k = document.getElementById('kijelzo'); k.innerHTML = "Frissítés...";
            try {
                const res = await fetch('https://api.coinbase.com/v2/prices/XAU-HUF/spot');
                const d = await res.json();
                const g = parseFloat(d.data.amount) / 31.1035;
                k.innerHTML = `<table><tr><th>Karát</th><th>Ár (Ft/g)</th></tr><tr><td>14K</td><td>${Math.round(g*0.585).toLocaleString()} Ft</td></tr><tr><td>24K</td><td>${Math.round(g).toLocaleString()} Ft</td></tr></table>`;
            } catch(e) { k.innerText = "Hiba az adatoknál."; }
        }

        function mutatBerPanel() {
            const k = document.getElementById('kijelzo');
            k.innerHTML = `<div class="calc-row"><div><label>Bruttó</label><input type="text" id="bruttoInp" oninput="berSzamol('brutto')"></div><div><label>Gyerek</label><input type="number" id="gyerekInp" value="0" oninput="berSzamol('brutto')"></div></div><button class="mehet-btn" onclick="generalTablazat()">MEHET</button><div id="tablazatHelye"></div>`;
        }

        // --- ÉLŐ TÖRVÉNYEK / HÍREK FUNKCIÓ ---
        async function getFrissTorvenyek() {
            const k = document.getElementById('kijelzo');
            const ma = new Date();
            const feleve = new Date();
            feleve.setMonth(ma.getMonth() - 6);
            
            k.innerHTML = `
                <div class="date-range-header">${feleve.toLocaleDateString('hu-HU')} - ${ma.toLocaleDateString('hu-HU')} friss hírek</div>
                <div class="loader">Élő jogszabályi és gazdasági hírek betöltése...</div>`;

            try {
                // RSS2JSON konvertert használunk, hogy a böngésző olvashassa a híreket
                const rssUrl = encodeURIComponent('https://adozona.hu/rss'); 
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await res.json();

                let html = `<div class="date-range-header">${feleve.toLocaleDateString('hu-HU')} - ${ma.toLocaleDateString('hu-HU')} friss hírek</div>`;
                
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        html += `
                            <div class="law-item">
                                <a href="${item.link}" target="_blank" class="law-title">${item.title}</a>
                                <div class="law-date">${item.pubDate} | Forrás: Adózóna</div>
                            </div>`;
                    });
                } else {
                    html += "Jelenleg nincs elérhető friss hír.";
                }
                k.innerHTML = html;
            } catch(e) {
                k.innerHTML = "Hiba történt a hírek betöltésekor. Kérlek, próbáld újra később!";
            }
        }

        // Bérszámoláshoz szükséges alapfüggvények (maradtak az eredetiek)
        function berSzamol(irany) { /* ... eredeti logika ... */ }
        function generalTablazat() { /* ... eredeti logika ... */ }
    </script>
</body>
</html>
